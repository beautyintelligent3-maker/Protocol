name: Sync to Office GitHub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync to Office Repository
        env:
          OFFICE_TOKEN: ${{ secrets.BIW_SYNC }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${OFFICE_TOKEN}@github.com" > ~/.git-credentials
          git remote add office https://github.com/beautyintelligent3-maker/Protocol.git
          git push office main --force
