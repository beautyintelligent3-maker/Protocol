name: Sync to Office GitHub

on:
  push:
    branches:
      - main

jobs:
  sync:
    if: github.repository == 'Zhovon/Tracking-System-For-BIW'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync to Office Repository
        env:
          OFFICE_TOKEN: ${{ secrets.BIW_SYNC || secrets.OFFICE_SYNC || secrets.OFFICE_TOKEN || secrets.OFFICE_GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${OFFICE_TOKEN}@github.com/beautyintelligent3-maker/Protocol.git main --force
